{% extends 'base.html' %}
{% block title %}Log Swim{% endblock %}

{% block extra_css %}
<style>
.swim-form    { display: flex; flex-direction: column; gap: 18px; }
.set-row-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Large number input for sets */
.sets-input { font-size: 1.4rem !important; font-weight: 700 !important; text-align: center; }

.total-display {
    background: var(--swim-bg); border-radius: 10px;
    color: var(--swim-fg); font-size: 1.1rem; font-weight: 700;
    padding: 14px; text-align: center;
}
#total-val { font-size: 1.45rem; }
</style>
{% endblock %}

{% block content %}
<h1>Log Swim</h1>

<form method="POST" action="/swim/new" class="swim-form">
    <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" name="date" value="{{ session_date }}" required>
    </div>

    <div class="set-row-group">
        <div class="form-group">
            <label for="sets">Sets</label>
            <input type="number" id="sets" name="sets" class="sets-input"
                   min="1" max="50" step="1" placeholder="10"
                   inputmode="numeric" required oninput="updateTotal()">
        </div>
        <div class="form-group">
            <label for="rep_distance_m">Per Set</label>
            <select id="rep_distance_m" name="rep_distance_m" required onchange="updateTotal()">
                <option value="50">50 m</option>
                <option value="100">100 m</option>
            </select>
        </div>
    </div>

    <div class="total-display" id="total-display" style="display:none">
        = <span id="total-val">—</span> m total
    </div>

    <div class="form-group">
        <label for="notes">Notes (optional)</label>
        <input type="text" id="notes" name="notes" placeholder="e.g. long steady effort">
    </div>

    <button type="submit" class="btn btn-swim btn-full">Save Swim</button>
</form>

<script>
function updateTotal() {
    const sets = parseInt(document.getElementById('sets').value) || 0;
    const rep  = parseInt(document.getElementById('rep_distance_m').value) || 0;
    const el   = document.getElementById('total-display');
    if (sets > 0) {
        document.getElementById('total-val').textContent = (sets * rep).toLocaleString();
        el.style.display = 'block';
    } else {
        el.style.display = 'none';
    }
}
</script>
{% endblock %}
