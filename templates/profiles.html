{% extends 'base.html' %}
{% block title %}Who's tracking?{% endblock %}

{% block extra_css %}
<style>
.profiles-page {
    display: flex; flex-direction: column; align-items: center;
    padding-top: 48px;
}
.profiles-page h1 { margin-bottom: 36px; text-align: center; }

.profile-cards {
    display: flex; flex-direction: column; gap: 14px; width: 100%;
}
.profile-card-btn {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px 24px;
    display: flex; align-items: center; gap: 18px;
    cursor: pointer; font-family: inherit; text-align: left;
    -webkit-tap-highlight-color: transparent;
}
.profile-card-btn:active { opacity: .75; }

.profile-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; font-weight: 800; flex-shrink: 0;
}
.profile-avatar.g { background: #7c3aed; }

.profile-info { flex: 1; }
.profile-card-name {
    font-size: 1.15rem; font-weight: 800; color: var(--text); display: block;
}
.profile-card-sub {
    font-size: 0.75rem; color: var(--dim); margin-top: 3px; display: block;
}
.profile-card-chevron { color: var(--dim); font-size: 1.1rem; }
</style>
{% endblock %}

{% block content %}
<div class="profiles-page">
    <h1>Who's tracking?</h1>
    <div class="profile-cards">
        {% for p in profiles %}
        <form method="POST" action="/profiles/select" style="width:100%">
            <input type="hidden" name="profile_id" value="{{ p.id }}">
            <button type="submit" class="profile-card-btn">
                <div class="profile-avatar {% if loop.index > 1 %}g{% endif %}">{{ p.name[0] }}</div>
                <div class="profile-info">
                    <span class="profile-card-name">{{ p.name }}</span>
                    {% if p.id == 1 %}
                    <span class="profile-card-sub">Gym · Swim · Food</span>
                    {% else %}
                    <span class="profile-card-sub">Food</span>
                    {% endif %}
                </div>
                <span class="profile-card-chevron">›</span>
            </button>
        </form>
        {% endfor %}
    </div>
</div>
{% endblock %}
